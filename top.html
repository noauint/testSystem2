<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Music School CRM</title>

    <style>

    body{
    margin:0;
    font-family:sans-serif;
    background:#f8f9fb;
    }

    /* ヘッダー */

    .header{
    height:80px;
    display:flex;
    align-items:center;
    padding:0 30px;

    background:white;
    border-bottom:1px solid #eee;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
    }

    .header img{
    height:70px;
    margin-right:15px;
    }

    .header h1{
    margin:0;
    font-size:20px;
    color:#d23c5a;
    font-weight:600;
    }

    /* 全体レイアウト */

    .container{
    display:flex;
    height:calc(100vh - 80px);
    }

    /* サイドメニュー */

    .sidebar{
    width:240px;

    background:linear-gradient(
    180deg,
    #ff9fb3,
    #ff7b9c
    );

    color:white;
    }

    /* メニュー */

    .menu{
    list-style:none;
    padding:0;
    margin:0;
    }

    .menu li{
    padding:16px 24px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;

    color:#5a1a2f;

    border-bottom:1px solid rgba(255,255,255,0.3);
    transition:0.2s;
    }

    .menu li:hover{
    background:rgba(255,255,255,0.2);
    }

    /* メイン画面 */

    .main{
    flex:1;
    padding:30px;
    position:relative;
    }

    /* 中央ウォーターマーク */

    .main::before{

    content:"";

    position:absolute;

    top:50%;
    left:50%;

    width:350px;
    height:350px;

    background-image:url("icon.png");
    background-size:contain;
    background-repeat:no-repeat;

    transform:translate(-50%,-50%);

    opacity:0.08;

    pointer-events:none;

    }

    /* ダッシュボードカード */

    .card{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    position:relative;
    }

    </style>
</head>

<body>

<!-- ヘッダー -->

<div class="header">

<img src="icon.png">

<h1>Music School CRM</h1>

</div>


<div class="container">

<!-- サイドメニュー -->

<div class="sidebar">

<ul class="menu">

<li>スケジュール</li>
<li>予約管理</li>
<li>生徒管理</li>
<li>体験予約管理</li>
<li>レッスン設定</li>
<li>Googleカレンダー連携</li>
<li>ブラックリスト管理</li>
<li>生徒ログイン</li>
<li><a href="login.html">ログアウト</a></li>
</ul>

</div>


<!-- メイン -->

<div class="main">

<div class="card">

<h2>先生ダッシュボード</h2>

<p>ここにスケジュールや予約状況などを表示します。</p>

</div>

</div>

</div>

</body>
</html>
